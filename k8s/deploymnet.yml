apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: dev
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx
  template:
    nodeSelector:
      node: worker1
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: shaikmustafa/paytm:bus
